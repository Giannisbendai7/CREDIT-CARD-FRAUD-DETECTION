name: ML CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install jupyter

      - name: Run notebook
        run: |
          jupyter nbconvert --to notebook --execute CREDIT-CARD-FRAUDLENT-FINTECHPROJECT.ipynb
